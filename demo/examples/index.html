<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tutuca-mb — ported docs examples</title>
    <!-- margaui theme variables (light + dark), same source the JS docs use -->
    <link
      rel="stylesheet"
      href="https://marianoguerra.github.io/margaui/themes/theme.css"
    />
    <style>
      /* page chrome only — the examples themselves are styled by margaui,
         compiled below from the class set the app publishes */
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        display: grid;
        grid-template-columns: 16rem 1fr;
        min-height: 100vh;
      }
      nav#index {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
        padding: 1rem;
        background: color-mix(in srgb, currentColor 5%, transparent);
        border-right: 1px solid color-mix(in srgb, currentColor 15%, transparent);
        overflow-y: auto;
        max-height: 100vh;
      }
      nav#index a {
        color: inherit;
        text-decoration: none;
        font-size: 0.85rem;
        padding: 0.15rem 0.35rem;
        border-radius: 3px;
      }
      nav#index a:hover {
        background: color-mix(in srgb, currentColor 10%, transparent);
      }
      main {
        padding: 1.5rem 2rem;
      }
      h1 {
        font-size: 1rem;
        font-family: ui-monospace, monospace;
        opacity: 0.7;
        margin: 0 0 1rem;
      }
    </style>
  </head>
  <body>
    <nav id="index"></nav>
    <main>
      <h1 id="title"></h1>
      <div id="app"></div>
    </main>
    <!--
      Build first:  moon build --target js
      Serve the REPO ROOT (the script path reaches into _build):
                    python3 -m http.server 8901
      Open:         http://localhost:8901/demo/examples/?name=counter
    -->
    <script src="../../_build/js/debug/build/demo/examples/examples.js"></script>
    <script type="module">
      // The classic script above ran main(), which published the class set
      // collected from the mounted example's compiled views (module scripts
      // are deferred, so ordering is guaranteed). Compile it with margaui —
      // the same CDN build the JS docs use — and inject the CSS.
      const classes = globalThis.__tutuca_classes ?? [];
      if (classes.length > 0) {
        try {
          const { compile } = await import(
            "https://cdn.jsdelivr.net/npm/margaui/+esm"
          );
          const css = await compile(classes);
          const style = document.createElement("style");
          style.id = "margaui-css";
          style.textContent = css;
          document.head.appendChild(style);
        } catch (err) {
          console.warn("margaui compile skipped:", err);
        }
      }
    </script>
  </body>
</html>
