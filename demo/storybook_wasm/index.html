<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tutuca-mb — storybook (wasm)</title>
    <!-- margaui theme variables (light + dark), same source the JS docs use -->
    <link
      rel="stylesheet"
      href="https://marianoguerra.github.io/margaui/themes/theme.css"
    />
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!--
      The storybook gallery running as WebAssembly (wasm-gc). Build + assemble:
        moon run --target native cmd/dev -- dist
      then serve dist/ and open storybook/. Or serve it with the CLI:
        dist/cli/tutuca storybook --port 4321
      For a raw build:
        moon build --target wasm-gc demo/storybook_wasm
      (needs a browser with the JS String Builtins proposal, e.g. Chrome).
    -->
    <script type="module">
      import { loadWasm, applyMargaui } from "./loader.mjs";
      // Register the <emoji-picker> custom element used by the
      // web-component-custom-event story (the JS docs load it on the demo page).
      import("https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js").catch(
        (err) => console.warn("emoji-picker-element load skipped:", err),
      );
      const exports = await loadWasm("./storybook_wasm.wasm");
      exports.mount();
      // Re-restore selection/filter/focus on Back/Forward. tutuca has no
      // lifecycle, so the host re-sends `init` (which re-reads the URL).
      // Programmatic push/replaceState don't fire popstate, so this only runs
      // on real navigation.
      window.addEventListener("popstate", () => exports.on_popstate());
      await applyMargaui();
    </script>
  </body>
</html>
